<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Future Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Quicksand:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app" role="application">
        <header class="app-header">
            <div class="brand">
                <img class="brand__logo" src="assets/logo.png" width="84" height="66" alt="" />
                <h1 class="brand__title">
                    <span class="brand__future">FUTURE</span>
                    <span class="brand__academy">ACADEMY</span>
                </h1>
            </div>
            <div class="app-header__actions">
                <button type="button" class="icon-btn" id="btn-settings" title="Cài đặt" aria-label="Cài đặt">
                    <img src="assets/iconSetting.png" width="32" height="32" alt="" />
                </button>
                <button type="button" class="icon-btn" id="btn-close" title="Đóng" aria-label="Đóng">
                    <img src="assets/iconClose.png" width="32" height="32" alt="" />
                </button>
            </div>
        </header>

        <main class="content" data-name="Content">
            <header class="content__header" data-name="Header">
                <img src="assets/iconChip.png" width="24" height="24" alt="" />
                <span class="content__header-title">Danh sách thiết bị:</span>
            </header>

            <p class="content__status" id="server-status" data-state="pending">Đang khởi động…</p>

            <div class="content__devices" data-name="DeviceList">
                <p class="device-empty" id="device-empty" hidden>Chưa phát hiện thiết bị USB nào.</p>
                <div class="device-list" id="device-list"></div>
            </div>

            <nav class="content__float" aria-label="Thao tác nhanh" data-name="Float">
                <button type="button" class="content__float-btn" id="btn-website">
                    <img src="assets/iconWebsite.png" width="24" height="24" alt="" />
                    <span>Website</span>
                </button>
                <button type="button" class="content__float-btn" id="btn-console">
                    <img src="assets/iconConsole.png" width="24" height="24" alt="" />
                    <span>Console</span>
                </button>
                <button type="button" class="content__float-btn" id="btn-refresh">
                    <img src="assets/iconRefresh.png" width="24" height="24" alt="" />
                    <span>Refresh</span>
                </button>
            </nav>
        </main>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
