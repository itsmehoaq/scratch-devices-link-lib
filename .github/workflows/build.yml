name: Build & Release

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS ARM64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            pkg_script: node script/package-app-mac.js --arch arm64
            artifact_name: FutureAcademy-arm64
            app_path: dist/Future Academy Link.app

          - label: macOS Intel
            os: macos-latest
            rust_target: x86_64-apple-darwin
            pkg_script: node script/package-app-mac.js --arch x64
            artifact_name: FutureAcademy-intel
            app_path: dist/Future Academy Link — Intel.app

          - label: Windows x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            pkg_script: node script/package-win-dist.js --target x86_64-pc-windows-msvc
            artifact_name: FutureAcademy-win
            zip_cmd: powershell Compress-Archive -Path dist\FutureAcademy-win -DestinationPath dist\FutureAcademy-win.zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            shell/target
          key: rust-${{ matrix.rust_target }}-${{ hashFiles('shell/Cargo.lock') }}
          restore-keys: rust-${{ matrix.rust_target }}-

      - name: Install npm dependencies
        run: npm install

      - name: Build Rust tray shell
        run: cargo build --release --manifest-path shell/Cargo.toml --target ${{ matrix.rust_target }}
        env:
          OTA_MANIFEST_URL: ${{ vars.OTA_MANIFEST_URL }}

      - name: Verify Windows GUI subsystem
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "shell/target/${{ matrix.rust_target }}/release/FutureAcademyTray.exe"
          $bytes = [System.IO.File]::ReadAllBytes($exe)
          $peOffset = [System.BitConverter]::ToInt32($bytes, 0x3c)
          $optionalHeader = $peOffset + 24
          $subsystem = [System.BitConverter]::ToUInt16($bytes, $optionalHeader + 68)
          if ($subsystem -ne 2) {
            throw "Expected Windows GUI subsystem (2), found $subsystem"
          }
          Write-Host "Verified Windows GUI subsystem; no console will be attached."

      - name: Package app (${{ matrix.label }})
        run: ${{ matrix.pkg_script }}

      - name: Create zip (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent "${{ matrix.app_path }}" "dist/${{ matrix.artifact_name }}.zip"

      - name: Create zip (Windows)
        if: matrix.zip_cmd
        shell: pwsh
        run: ${{ matrix.zip_cmd }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.zip
          retention-days: 7

  release:
    name: Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Validate optional R2 OTA configuration
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
          OTA_MANIFEST_URL: ${{ vars.OTA_MANIFEST_URL }}
        run: |
          set -euo pipefail
          configured=0
          for value in \
            "$R2_ACCESS_KEY_ID" \
            "$R2_SECRET_ACCESS_KEY" \
            "$R2_ACCOUNT_ID" \
            "$R2_BUCKET" \
            "$R2_PUBLIC_BASE_URL" \
            "$OTA_MANIFEST_URL"; do
            if [[ -n "$value" ]]; then
              configured=$((configured + 1))
            fi
          done

          if (( configured == 0 )); then
            echo "R2 OTA publishing is disabled."
          elif (( configured != 6 )); then
            echo "R2 OTA configuration is incomplete. Configure all documented secrets and variables."
            exit 1
          fi

      - name: Generate release body
        id: body
        run: |
          cat > release-body.md <<-EOF
          ## Future Academy Link v${{ steps.ver.outputs.version }}

          ### Downloads
          | Platform | Asset |
          |----------|-------|
          | Windows | FutureAcademy-win.zip |
          | macOS Apple Silicon | FutureAcademy-arm64.zip |
          | macOS Intel | FutureAcademy-intel.zip |

          See [release.md](https://github.com/${{ github.repository }}/blob/main/release.md) for build instructions.
          EOF

      - name: Push tag
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          remote_tag_sha=$(git ls-remote --tags origin "refs/tags/${{ steps.ver.outputs.tag }}" | awk '{print $1}')
          if [[ -z "$remote_tag_sha" ]]; then
            git tag ${{ steps.ver.outputs.tag }} ${{ github.sha }}
            git push origin ${{ steps.ver.outputs.tag }}
          elif [[ "$remote_tag_sha" == "${{ github.sha }}" ]]; then
            echo "Release tag ${{ steps.ver.outputs.tag }} already points to this commit; continuing retry."
          else
            echo "Release tag ${{ steps.ver.outputs.tag }} points to another commit. Bump package.json and shell/Cargo.toml before releasing."
            exit 1
          fi

      - name: Generate R2 OTA manifest
        if: vars.R2_ACCOUNT_ID != '' && vars.R2_BUCKET != '' && vars.R2_PUBLIC_BASE_URL != '' && vars.OTA_MANIFEST_URL != ''
        env:
          OTA_VERSION: ${{ steps.ver.outputs.version }}
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
        run: node script/generate-ota-manifest.js artifacts ota/latest.json

      - name: Publish OTA release to Cloudflare R2
        if: vars.R2_ACCOUNT_ID != '' && vars.R2_BUCKET != '' && vars.R2_PUBLIC_BASE_URL != '' && vars.OTA_MANIFEST_URL != ''
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
          OTA_MANIFEST_URL: ${{ vars.OTA_MANIFEST_URL }}
          OTA_VERSION: ${{ steps.ver.outputs.version }}
        run: bash script/publish-r2-ota.sh artifacts ota/latest.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body_path: release-body.md
          files: artifacts/*.zip
          make_latest: true
