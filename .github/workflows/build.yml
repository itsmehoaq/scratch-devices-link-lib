name: Build App

on:
  push:
    branches: [macos-optimize, main, dev]
    tags: ['v*']
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS ARM64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            pkg_script: node script/package-app-mac.js --arch arm64
            artifact_name: FutureAcademy-arm64

          - label: macOS Intel
            os: macos-latest
            rust_target: x86_64-apple-darwin
            pkg_script: node script/package-app-mac.js --arch x64
            artifact_name: FutureAcademy-intel

          - label: Windows x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            pkg_script: node script/package-win-dist.js --target x86_64-pc-windows-msvc
            artifact_name: FutureAcademy-win

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            shell/target
          key: rust-${{ matrix.rust_target }}-${{ hashFiles('shell/Cargo.lock') }}
          restore-keys: rust-${{ matrix.rust_target }}-

      - name: Install Node dependencies
        run: npm ci

      - name: Generate .icns
        if: runner.os == 'macOS'
        run: node script/generate-icns.js

      - name: Build Rust tray shell
        run: cargo build --release --manifest-path shell/Cargo.toml --target ${{ matrix.rust_target }}

      - name: Package app
        run: ${{ matrix.pkg_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          retention-days: 7

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
