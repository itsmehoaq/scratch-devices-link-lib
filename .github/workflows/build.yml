name: Build App

on:
  push:
    branches: [macos-optimize, main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS ARM64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            pkg_script: node script/package-app-mac.js --arch arm64
            artifact_name: FutureAcademy-arm64
            zip_cmd: ditto -c -k --sequesterRsrc --keepParent dist/FutureAcademy.app dist/FutureAcademy-arm64.zip

          - label: macOS Intel
            os: macos-latest
            rust_target: x86_64-apple-darwin
            pkg_script: node script/package-app-mac.js --arch x64
            artifact_name: FutureAcademy-intel
            zip_cmd: ditto -c -k --sequesterRsrc --keepParent dist/FutureAcademy-intel.app dist/FutureAcademy-intel.zip

          - label: Windows x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            pkg_script: node script/package-win-dist.js --target x86_64-pc-windows-msvc
            artifact_name: FutureAcademy-win
            zip_cmd: powershell Compress-Archive -Path dist\FutureAcademy-win -DestinationPath dist\FutureAcademy-win.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            shell/target
          key: rust-${{ matrix.rust_target }}-${{ hashFiles('shell/Cargo.lock') }}
          restore-keys: rust-${{ matrix.rust_target }}-

      - name: Build Rust tray shell
        run: cargo build --release --manifest-path shell/Cargo.toml --target ${{ matrix.rust_target }}

      - name: Package app
        run: ${{ matrix.pkg_script }}

      - name: Create zip
        run: ${{ matrix.zip_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.zip
          retention-days: 7

  release:
    name: Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/macos-optimize' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Push tag
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ steps.ver.outputs.tag }} ${{ github.sha }}
          git push origin ${{ steps.ver.outputs.tag }} --force

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: artifacts/*.zip
          make_latest: true
